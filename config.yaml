# Market Data Warehouse Configuration

# Database settings
database:
  host: localhost
  port: 5432
  name: market_data
  user: postgres
  password: postgres

# Raw data lake path
raw_lake_path: data/raw

# Source configurations
fred:
  api_key: null  # Set via FRED_API_KEY env var
  base_url: https://api.stlouisfed.org/fred
  series_codes:
    # --- Original macro indicators ---
    - GDP
    - UNRATE
    - CPIAUCSL
    - FEDFUNDS
    - T10Y2Y
    - VIXCLS
    - DGS10
    - DGS2
    - TB3MS
    # --- Credit spreads ---
    - BAMLH0A0HYM2    # ICE BofA US High Yield Index Option-Adjusted Spread
    - BAMLC0A4CBBB    # ICE BofA BBB US Corporate Index Option-Adjusted Spread
    # --- Housing ---
    - HOUST            # Housing Starts: Total New Privately Owned
    - CSUSHPISA        # S&P/Case-Shiller U.S. National Home Price Index
    # --- Labor market ---
    - ICSA             # Initial Claims (weekly)
    - PAYEMS           # All Employees, Total Nonfarm
    # --- Money supply ---
    - M2SL             # M2 Money Stock
    # --- Commodities ---
    - DCOILWTICO       # Crude Oil Prices: WTI
    - GOLDAMGBD228NLBM # Gold Fixing Price (London, USD)
    # --- Dollar index ---
    - DTWEXBGS         # Trade Weighted U.S. Dollar Index: Broad, Goods and Services
    # --- Financial conditions ---
    - NFCI             # Chicago Fed National Financial Conditions Index
    # --- Leading indicators ---
    - USSLIND          # Leading Index for the United States
    # --- Inflation expectations ---
    - T5YIE            # 5-Year Breakeven Inflation Rate
    - T10YIE           # 10-Year Breakeven Inflation Rate
    # --- FX rates (major pairs) ---
    - DEXUSEU          # USD/EUR Exchange Rate
    - DEXJPUS          # JPY/USD Exchange Rate
    - DEXUSUK          # USD/GBP Exchange Rate
    - DEXCHUS          # CNY/USD Exchange Rate
    - DEXCAUS          # CAD/USD Exchange Rate
  enabled: true

gdelt:
  base_url: https://api.gdeltproject.org/api/v2
  enabled: true
  max_days_per_request: 30
  available_time_source: DATEADDED

polymarket:
  base_url: https://clob.polymarket.com
  gamma_url: https://gamma-api.polymarket.com
  enabled: true
  rate_limit_per_sec: 5.0
  universe_mode: top_volume
  top_volume_limit: 50
  explicit_markets: []
  orderbook_snapshot_freq: "5m"
  trades_page_size: 100
  trades_max_pages: 200

prices:
  source: yahoo
  api_key: null
  enabled: true
  market_close_time: "16:00:00"
  exchange_timezone: "America/New_York"
  vendor_delay_minutes: 15
  universe:
    - SPY
    - QQQ
    - IWM
    - VTI
    - VOO
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - TSLA
    - NVDA
    - JPM
    - JNJ
    - V
    - WMT
    - PG
    - UNH
    - HD
    - MA

# SEC EDGAR settings (fundamentals, insider trades, 13F)
sec_edgar:
  enabled: true
  rate_limit_delay: 0.12

# Options data settings
options:
  enabled: true
  source: yahoo
  max_expirations: 6

# Earnings calendar settings
earnings:
  enabled: true
  source: yahoo

# Social media sentiment settings
sentiment:
  enabled: true
  subreddits:
    - wallstreetbets
    - stocks
    - investing
    - options
  posts_per_subreddit: 100

# Short interest settings
short_interest:
  enabled: true

# ETF fund flows settings
etf_flows:
  enabled: true
  etf_universe:
    - SPY
    - QQQ
    - IWM
    - VTI
    - VOO
    - XLF
    - XLK
    - XLE
    - XLV
    - XLI
    - TLT
    - IEF
    - SHY
    - LQD
    - HYG
    - GLD
    - SLV
    - USO
    - EEM
    - EFA
    - VWO

# Factor data settings
factors:
  source: ken_french
  min_history_days: 252
  enabled: true
  available_time_lag_days: 1
  available_time_release_time: "09:30"
  exchange_timezone: "America/New_York"

# Historical fixes (conservative availability + latency stats)
historical_fixes:
  max_backfill_days: 5
  min_latency_samples: 500
  latency_percentile: 0.95
  latency_stats_max_age_hours: 24
  macro_release_time: "12:00:00"
  macro_release_timezone: "America/New_York"
  macro_release_jitter_minutes: 60
  price_outlier_mad_threshold: 3.5
  trade_outlier_mad_threshold: 4.0
  gdelt_fallback_lag_minutes: 180
  polymarket_fallback_lag_minutes: 2
  polymarket_universe_audit: true
  selection_weight_mode: "count"

# Evaluation settings
evaluation:
  cost_bps: 20.0
  edge_threshold: 0.02
  rebalance_freq: "1d"
  benchmark_symbol: "SPY"
  max_leverage: 2.0
  max_adv_pct: 0.1
  borrow_cost_bps: 30.0
  slippage_bps: 2.0
  pm_fee_bps: 10.0

# Notification / alerting settings
notifications:
  enabled: true
  # Slack: set webhook URL to enable (or use NOTIFY_SLACK_WEBHOOK_URL env var)
  slack_webhook_url: ""
  slack_min_severity: WARNING     # INFO | WARNING | CRITICAL
  # Email: set smtp_host to enable (or use NOTIFY_SMTP_HOST env var)
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""               # prefer NOTIFY_SMTP_PASSWORD env var
  smtp_use_tls: true
  email_from: ""
  email_to: []
  email_min_severity: CRITICAL    # INFO | WARNING | CRITICAL
  # Console (always on)
  console_min_severity: INFO      # INFO | WARNING | CRITICAL

# Real-time price feed settings
realtime_feed:
  enabled: false
  source: alpaca        # alpaca | polygon
  mode: websocket       # websocket | polling
  poll_interval_seconds: 30
  stale_threshold_seconds: 120
  reconnect_max_retries: 5
  reconnect_backoff_base: 2.0
  data_feed: iex        # iex (free) | sip (paid, requires subscription)

# Alpaca broker / execution settings
execution:
  broker: alpaca
  mode: paper  # paper or live
  base_url: https://paper-api.alpaca.markets
  max_capital: 300.0
  risk_per_trade_pct: 0.02
  max_positions: 2
  order_type: limit
  limit_offset_pct: 0.001
  min_score: 60
  min_confidence: LOW
  require_cash_account: true
  max_daily_orders: 10
  signal_dir: signals
  log_dir: logs/paper_trading

# Pipeline defaults
default_start_date: "2024-01-01"
default_end_date: "2024-12-31"
batch_size: 1000
