name: CI — Agent Directive V7 Testing Pyramid (Section 23.3)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Stage 1: Pre-commit — Linting, formatting, type checking (Section 23.3)
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Black formatting check
        run: black --check src/ tests/
      - name: MyPy type checking
        run: mypy src/

  # Stage 2: Unit + property tests (Section 23.3)
  unit-tests:
    name: Unit & property tests
    needs: pre-commit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run unit and property tests
        run: >
          pytest tests/ -v --tb=short
          -k "not integration and not system"
          --junitxml=reports/unit-test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: reports/unit-test-results.xml

  # Stage 3: Integration tests (Section 23.3)
  integration-tests:
    name: Integration tests
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: market_data_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: market_data_test
      DB_USER: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev,postgresql]"
      - name: Initialize test database
        run: python -m pipeline.cli init-db
      - name: Run integration tests
        run: >
          pytest tests/ -v --tb=short
          -k "integration"
          --junitxml=reports/integration-test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-test-results.xml

  # Stage 4: Coverage gate (Section 23.3)
  coverage:
    name: Coverage gate
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: >
          pytest tests/ -v --tb=short
          --cov=pipeline
          --cov-report=xml:reports/coverage.xml
          --cov-report=term-missing
          --cov-fail-under=50
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/coverage.xml

  # Stage 5: Temporal integrity tests (Section 23.2)
  temporal-integrity:
    name: Temporal integrity tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run temporal integrity tests
        run: >
          pytest tests/test_temporal_integrity.py -v --tb=long
          --junitxml=reports/temporal-integrity-results.xml
      - name: Run directive v7 compliance tests
        run: >
          pytest tests/test_directive_v7.py -v --tb=long
          --junitxml=reports/directive-v7-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: temporal-integrity-results
          path: reports/

  # Stage 6: Model validation smoke test (Section 23.3)
  model-smoke-test:
    name: Model validation smoke test
    needs: [unit-tests, temporal-integrity]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Verify pipeline modules import cleanly
        run: |
          python -c "
          from pipeline.experiment_registry import ExperimentRegistry
          from pipeline.drift_detection import DriftDetector
          from pipeline.deployment_pipeline import DeploymentPipeline
          from pipeline.compute_budget import ComputeBudget
          from pipeline.governance import GovernanceFramework
          from pipeline.agent_coordinator import AgentCoordinator
          from pipeline.conflict_resolution import ConflictResolver
          print('All directive V7 modules import successfully')
          "
      - name: Verify strategy and backtesting modules
        run: |
          python -c "
          from pipeline.backtesting.simulator import BacktestSimulator
          from pipeline.backtesting.walk_forward import WalkForwardRunner
          from pipeline.features.technical_indicators import TechnicalIndicators
          print('Core pipeline modules import successfully')
          "

  # Nightly: Full system tests (Section 23.3 — no merge block)
  system-tests:
    name: System tests (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: market_data_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: market_data_test
      DB_USER: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev,postgresql]"
      - name: Initialize database
        run: python -m pipeline.cli init-db
      - name: Run full test suite
        run: >
          pytest tests/ -v --tb=long
          --junitxml=reports/system-test-results.xml
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-test-results
          path: reports/system-test-results.xml
