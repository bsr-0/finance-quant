name: Daily Stock Predictions

on:
  schedule:
    # Run weekdays at 21:30 UTC (5:30 PM ET, after US market close)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[web]"

      - name: Initialize database
        run: make db-init

      - name: Extract latest prices (Yahoo Finance, no API key needed)
        run: |
          END_DATE=$(date +%Y-%m-%d)
          START_DATE=$(date -d "-365 days" +%Y-%m-%d)
          python -m pipeline.cli extract prices --start "$START_DATE" --end "$END_DATE"
          python -m pipeline.cli load-raw prices

      - name: Extract FRED macro data
        if: ${{ secrets.FRED_API_KEY != '' }}
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          END_DATE=$(date +%Y-%m-%d)
          START_DATE=$(date -d "-365 days" +%Y-%m-%d)
          python -m pipeline.cli extract fred --start "$START_DATE" --end "$END_DATE"
          python -m pipeline.cli load-raw fred

      - name: Transform to curated layer
        run: python -m pipeline.cli transform-curated

      - name: Validate price data coverage
        run: |
          python -c "
          from pipeline.database import get_db
          db = get_db()
          rows = db.run_query('SELECT ticker FROM dim_symbol ORDER BY ticker')
          tickers_in_db = {r[\"ticker\"] for r in rows}

          import yaml
          cfg = yaml.safe_load(open('config.yaml'))
          pred_universe = set(cfg['daily_predictions']['universe'])
          extract_universe = set(cfg['prices']['universe'])

          missing_extract = pred_universe - extract_universe
          if missing_extract:
              print(f'::error::Prediction universe tickers not in extraction universe: {sorted(missing_extract)}')

          missing_db = pred_universe - tickers_in_db
          if missing_db:
              print(f'::warning::Prediction universe tickers not in dim_symbol: {sorted(missing_db)}')

          # Check row counts for each prediction ticker
          for t in sorted(pred_universe):
              count_rows = db.run_query(
                  'SELECT COUNT(*) as n FROM cur_prices_ohlcv_daily p '
                  'JOIN dim_symbol s ON p.symbol_id = s.symbol_id '
                  'WHERE s.ticker = :ticker',
                  {'ticker': t},
              )
              n = count_rows[0]['n'] if count_rows else 0
              status = 'ok' if n >= 200 else ('low' if n > 0 else 'MISSING')
              print(f'  {t:6s}: {n:>5d} rows [{status}]')

          if missing_extract:
              raise SystemExit(1)
          "

      - name: Generate signals and build site
        run: python -m pipeline.cli daily-predictions

      - name: Commit updated data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/prediction_history.json data/signals/ site/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily predictions $(date +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
