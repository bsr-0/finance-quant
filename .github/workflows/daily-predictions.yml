name: Daily Stock Predictions

on:
  schedule:
    # Run weekdays at 21:30 UTC (5:30 PM ET, after US market close)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[web]"

      - name: Initialize database
        run: make db-init

      - name: Extract latest prices (Yahoo Finance, no API key needed)
        run: |
          END_DATE=$(date +%Y-%m-%d)
          START_DATE=$(date -d "-365 days" +%Y-%m-%d)
          python -m pipeline.cli extract prices --start "$START_DATE" --end "$END_DATE"
          python -m pipeline.cli load-raw prices

      - name: Transform to curated layer
        run: python -m pipeline.cli transform-curated

      - name: Generate signals and build site
        run: python -m pipeline.cli daily-predictions

      - name: Commit updated data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/prediction_history.json data/signals/ site/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily predictions $(date +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
